name: Full DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # Build Docker image
    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-app ./app

    # Docker login
    - name: Login DockerHub
      run: |
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login \
        -u ${{ secrets.DOCKER_USERNAME }} \
        --password-stdin

    # Push image
    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/hello-app

    # Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    # AWS login
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    # Destroy old infra (safe)
    - name: Terraform Destroy
      run: |
        cd terraform
        terraform init
        terraform destroy -auto-approve || true

    # Create infra + get IP
    - name: Terraform Apply
      id: tf
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve

        IP=$(terraform output -raw public_ip | tr -d '"')
        echo "ip=$IP" >> $GITHUB_OUTPUT

    # Wait for EC2 + Kubernetes setup
    - name: Wait for instance ready
      run: sleep 60

    # Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ steps.tf.outputs.ip }}
        username: ubuntu
        key: ${{ secrets.PRIVATE_KEY }}
        script: |
          set -e
          export KUBECONFIG=/home/ubuntu/.kube/config

          cd /home/ubuntu

          if [ ! -d "hello-devops-project" ]; then
            git clone https://github.com/SaiVarun107/hello-devops-project.git
          fi

          cd hello-devops-project
          git pull

          kubectl apply -f k8s
          kubectl rollout restart deployment hello-app
          kubectl rollout status deployment hello-app

    # Print URL
    - name: Print URL
      run: |
        echo "App URL: http://${{ steps.tf.outputs.ip }}:30007"
