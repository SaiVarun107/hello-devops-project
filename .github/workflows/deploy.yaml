name: Full Devops Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/myapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_IMAGE:${{ steps.meta.outputs.tag }} .

      - name: Push Docker image
        run: |
          docker push $DOCKER_IMAGE:${{ steps.meta.outputs.tag }}

  terraform:
    runs-on: ubuntu-latest
    needs: build-and-push

    outputs:
      ec2_ip: ${{ steps.get_ip.outputs.ec2_ip }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      # ✅ SAFE OUTPUT PARSING (Fixes "invalid format")
      - name: Get EC2 Public IP
        id: get_ip
        run: |
          IP=$(terraform output -raw ec2_public_ip | tr -d '\n' | xargs)
          echo "EC2_IP=$IP"
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ DEBUG STEP (prevents missing host confusion)
      - name: Debug EC2 IP
        run: |
          echo "EC2 IP is: ${{ needs.terraform.outputs.ec2_ip }}"

      # ✅ SSH DEPLOY (Fixes "missing host")
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Connected to server"

            # Update kubeconfig if needed
            export KUBECONFIG=/home/ubuntu/.kube/config

            # Pull latest image
            docker pull ${{ env.DOCKER_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}

            # Update Kubernetes deployment
            kubectl set image deployment/myapp myapp=${{ env.DOCKER_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }} --record

            kubectl rollout status deployment/myapp
